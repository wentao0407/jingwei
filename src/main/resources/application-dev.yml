# 开发环境配置
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jingwei_dev
    username: jingwei
    password: jingwei123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      password: root123
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

# JWT 配置
jwt:
  secret: jingwei-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 28800000  # 8小时（毫秒）

# 日志配置
logging:
  level:
    com.jingwei: debug
