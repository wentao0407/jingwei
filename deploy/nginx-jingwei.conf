# /etc/nginx/conf.d/jingwei.conf
# JingWei 生产环境 Nginx 配置
# 使用方式: sudo cp deploy/nginx-jingwei.conf /etc/nginx/conf.d/jingwei.conf

server {
    listen       80;
    server_name  _;  # 生产环境替换为实际域名

    # --- 前端静态资源 ---
    root /opt/jingwei/frontend;
    index index.html;

    # 前端 SPA 路由：所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存（Vite 构建产物带 hash）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- 后端 API 反向代理 ---
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;

        # 文件上传大小限制
        client_max_body_size 20m;
    }

    # --- 安全头 ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Gzip 压缩 ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # --- 错误页面 ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
