<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JingWei Login Quiet</title>
    <link rel="stylesheet" href="./mockups.css" />
  </head>
  <body class="quiet">
    <main class="login-shell">
      <section class="login-visual quiet-login-visual-image">
        <div class="brand-row"><span class="brand-mark">JW</span> JingWei 经纬</div>
        <div class="hero-copy">
          <h1>把订单、生产、仓储和物流放在一张清晰的工作台上。</h1>
          <p>安静克制的企业后台风格，适合长时间办公、表格录入、跨部门协作和稳定交付。</p>
          <div class="mini-board">
            <div class="mini-tile"><strong>128</strong><span>在制订单</span></div>
            <div class="mini-tile"><strong>96%</strong><span>准交率</span></div>
            <div class="mini-tile"><strong>18</strong><span>待审批</span></div>
          </div>
        </div>
        <div></div>
      </section>
      <section class="login-card">
        <h2>登录系统</h2>
        <p class="hint">使用企业账号进入经纬生产管理系统</p>
        <div class="field"><label>用户名</label><input value="admin" /></div>
        <div class="field"><label>密码</label><input type="password" value="jingwei123" /></div>
        <button class="primary-btn">登录</button>
        <div class="meta-row"><span>开发环境</span><span>v0.1.0</span></div>
      </section>
    </main>
  </body>
</html>
